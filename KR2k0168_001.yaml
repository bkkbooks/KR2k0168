body:
  text: 梁州記武侯壘武侯壘東南有定軍山八十餘里有諸葛武侯墓鍾會征蜀至漢川祭亮之墓令軍士不得於墓芻啓樵采今松柏碑銘儼然白水關關城西南百八十里有白水關固解印授處也溫泉漢水南有溫泉周圍數千步冬夏當沸涌若湯其熱可熟雞子盟壇沔陽城在漢水南舊蕭何所築也劉備為漢王權住此城盟於城下今門外有盟壇猶存諸葛井諸葛亮宅有井深四尺餘口廣一尺五寸纍磚如初開云雁塞梁州縣界有鴈塞山傳云此山有大池水鴈樓集之故因名曰鴈塞
